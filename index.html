<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Báo Cáo Công Việc Hàng Ngày (Google Sheets)</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-100 min-h-screen p-5">

    <div class="max-w-4xl mx-auto bg-white p-6 rounded-lg shadow-md">
        <h1 class="text-2xl font-bold text-center text-green-600 mb-6">DAILY REPORT - GOOGLE SHEETS DB</h1>

        <form id="reportForm" class="space-y-4 mb-8 border-b pb-6">
            <div>
                <label class="block text-sm font-medium text-gray-700">Thành viên:</label>
                <select id="memberName" class="mt-1 block w-full p-2 border border-gray-300 rounded-md" required>
                    <option value="">-- Chọn tên của bạn --</option>
                    <option value="Thành viên 1">Thành viên 1</option>
                    <option value="Thành viên 2">Thành viên 2</option>
                    <option value="Thành viên 3">Thành viên 3</option>
                </select>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">Công việc đã làm hôm nay:</label>
                <textarea id="workDone" rows="3" class="mt-1 block w-full p-2 border border-gray-300 rounded-md" placeholder="- Fix bug..." required></textarea>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">Khó khăn / Đề xuất:</label>
                <input type="text" id="issue" class="mt-1 block w-full p-2 border border-gray-300 rounded-md" placeholder="Không có">
            </div>
            <button type="submit" id="submitBtn" class="w-full bg-green-600 text-white p-2 rounded-md hover:bg-green-700 font-semibold">Gửi Báo Cáo</button>
        </form>

        <div>
            <h2 class="text-xl font-semibold text-gray-800 mb-4">Báo cáo trong ngày</h2>
            <div id="reportList" class="space-y-3">
                <p class="text-gray-500 text-center py-4">Đang tải dữ liệu từ Google Sheets...</p>
            </div>
        </div>
    </div>

    <script>
        // DÁN URL ỨNG DỤNG WEB CỦA BẠN VÀO ĐÂY
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw45wHNXLtRNNo11kW_3D1KV7KdSyHOlnCPFisJ-Ks_I2op6yU1l72z_GlGiKsArEUjtw/exec";

        // Hàm tải dữ liệu (Đọc từ Sheets)
        function loadReports() {
            fetch(SCRIPT_URL)
                .then(response => response.json())
                .then(data => {
                    const reportListDiv = document.getElementById('reportList');
                    reportListDiv.innerHTML = '';

                    if(data.length === 0) {
                        reportListDiv.innerHTML = '<p class="text-gray-500 text-center py-4">Chưa có báo cáo nào.</p>';
                        return;
                    }

                    // Đảo ngược để báo cáo mới nhất lên đầu
                    data.reverse().forEach(report => {
                        const card = document.createElement('div');
                        card.className = "p-4 bg-gray-50 border-l-4 border-green-500 rounded shadow-sm";
                        card.innerHTML = `
                            <div class="flex justify-between items-center mb-1">
                                <span class="font-bold text-gray-800">${report.name}</span>
                                <span class="text-xs text-gray-500">${report.time}</span>
                            </div>
                            <p class="text-sm text-gray-700 whitespace-pre-line"><strong>Công việc:</strong>\n${report.work}</p>
                            <p class="text-sm text-red-600 mt-1"><strong>Khó khăn:</strong> ${report.issue}</p>
                        `;
                        reportListDiv.appendChild(card);
                    });
                })
                .catch(error => {
                    console.error("Lỗi tải dữ liệu:", error);
                    document.getElementById('reportList').innerHTML = '<p class="text-red-500 text-center py-4">Không thể tải dữ liệu.</p>';
                });
        }

        // Xử lý gửi báo cáo (Ghi vào Sheets)
        document.getElementById('reportForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.innerText = "Đang gửi...";

            const reportData = {
                time: new Date().toLocaleString('vi-VN'),
                name: document.getElementById('memberName').value,
                work: document.getElementById('workDone').value,
                issue: document.getElementById('issue').value || "Không có"
            };

            // Gửi dữ liệu tới Google Apps Script bằng phương thức POST
            fetch(SCRIPT_URL, {
                method: "POST",
                body: JSON.stringify(reportData)
            })
            .then(res => res.json())
            .then(result => {
                if(result.status === "success") {
                    alert("Gửi báo cáo lên Google Sheets thành công!");
                    document.getElementById('reportForm').reset();
                    loadReports(); // Tải lại danh sách
                } else {
                    alert("Có lỗi xảy ra: " + result.message);
                }
            })
            .catch(error => alert("Lỗi kết nối: " + error))
            .finally(() => {
                submitBtn.disabled = false;
                submitBtn.innerText = "Gửi Báo Cáo";
            });
        });

        // Chạy tải dữ liệu ngay khi mở trang
        loadReports();
    </script>
</body>
</html>
